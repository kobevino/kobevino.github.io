language: node_js
before_script:
  - npm install -g gatsby-cli
node_js:
  - "15.14.0"
deploy:
  provider: pages
  skip_cleanup: true
  github_token: $GITHUB_TOKEN 
  keep_history: true
  target_branch: main
  on:
    branch: master
